<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Four The20 — Muse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #080808;
      --deep: #0e0e0e;
      --card: #131313;
      --gold: #c9a84c;
      --gold-dim: #a07830;
      --green: #3a6b35;
      --green-bright: #4ade80;
      --cream: #f0e6cc;
      --red: #c0392b;
      --white: #f5f5f0;
      --muted: #555;
      --border: rgba(201,168,76,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(12px);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-decoration: none;
      text-transform: uppercase;
    }

    .logo span { color: var(--white); }

    nav { display: flex; gap: 2rem; align-items: center; }

    nav a {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--gold); }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--gold); }

    /* LOADING */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
    }

    .loader { display: flex; gap: 0.4rem; }

    .loader-dot {
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: loaderPulse 1.2s infinite;
    }

    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes loaderPulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    .loader-text {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* MAIN CONTENT */
    #content { display: none; padding-top: 65px; }

    /* HERO STREAM SECTION */
    .stream-section {
      display: grid;
      grid-template-columns: 1fr 380px;
      min-height: calc(100vh - 65px);
      border-bottom: 1px solid var(--border);
    }

    /* STREAM */
    .stream-container {
      position: relative;
      background: #000;
      border-right: 1px solid var(--border);
    }

    .stream-iframe {
      width: 100%;
      height: 100%;
      min-height: 500px;
      border: none;
      display: block;
    }

    .stream-offline {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--deep);
    }

    .stream-offline.visible { display: flex; }

    .offline-text {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .offline-name {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-style: italic;
      color: var(--gold);
      opacity: 0.3;
    }

    /* SIDEBAR */
    .sidebar {
      display: flex;
      flex-direction: column;
      background: var(--deep);
      overflow-y: auto;
    }

    /* MODEL HEADER */
    .model-header {
      padding: 2rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .model-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
      margin-bottom: 1rem;
      display: block;
    }

    .model-photo-placeholder {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid var(--border);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: var(--muted);
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(8,8,8,0.8);
      border: 1px solid var(--green-bright);
      padding: 0.3rem 0.7rem;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green-bright);
      margin-bottom: 0.8rem;
    }

    .live-badge.offline {
      border-color: var(--muted);
      color: var(--muted);
    }

    .live-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green-bright);
      animation: pulse 2s infinite;
    }

    .live-dot.off {
      background: var(--muted);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .model-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    .model-handle {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .model-bio {
      font-size: 0.65rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.5);
    }

    /* TAGS */
    .tags-section {
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag {
      font-size: 0.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold-dim);
      padding: 0.25rem 0.6rem;
    }

    /* ACTIONS */
    .actions-section {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .btn {
      width: 100%;
      padding: 0.9rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: block;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--black);
      font-weight: 500;
    }

    .btn-primary:hover { background: var(--cream); }

    .btn-secondary {
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn-secondary:hover { border-color: var(--white); }

    .btn-tip {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
    }

    .btn-tip:hover {
      background: var(--gold);
      color: var(--black);
    }

    /* PLATFORM LINKS */
    .platforms-section {
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }

    .platform-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .platform-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.8rem;
      background: var(--card);
      border: 1px solid var(--border);
      text-decoration: none;
      transition: border-color 0.2s;
    }

    .platform-link:hover { border-color: var(--gold-dim); }

    .platform-name {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
    }

    .platform-arrow {
      font-size: 0.6rem;
      color: var(--gold);
    }

    /* PHOTO GALLERY */
    .gallery-section {
      padding: 2.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gallery-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .gallery-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-style: italic;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5px;
    }

    .gallery-item {
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
    }

    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      filter: grayscale(15%);
    }

    .gallery-item:hover img {
      transform: scale(1.05);
      filter: grayscale(0%);
    }

    .gallery-empty {
      grid-column: 1/-1;
      padding: 3rem;
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* MORE MUSES */
    .more-section {
      padding: 2.5rem;
      border-top: 1px solid var(--border);
      background: var(--deep);
    }

    .more-label {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .more-grid {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }

    .more-card {
      flex: 0 0 160px;
      aspect-ratio: 3/4;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s;
    }

    .more-card:hover { border-color: var(--gold-dim); }

    .more-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: grayscale(30%);
      transition: all 0.3s;
    }

    .more-card:hover img { filter: grayscale(0%); }

    .more-card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0.8rem;
      background: linear-gradient(to top, rgba(8,8,8,0.95), transparent);
    }

    .more-card-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--white);
    }

    .more-card-placeholder {
      flex: 0 0 160px;
      aspect-ratio: 3/4;
      background: var(--card);
      border: 1px dashed rgba(201,168,76,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0.15em;
    }

    .footer-links { display: flex; gap: 2rem; flex-wrap: wrap; }

    .footer-links a {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--gold); }

    .footer-copy {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: rgba(85,85,85,0.5);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-up { animation: fadeUp 0.5s ease forwards; }

    @media (max-width: 900px) {
      .stream-section { grid-template-columns: 1fr; }
      .stream-container { min-height: 56vw; }
      .stream-iframe { min-height: 56vw; }
      header { padding: 1rem 1.2rem; }
      .gallery-section, .more-section { padding: 1.5rem 1.2rem; }
    }
  </style>
</head>
<body>

  <header>
    <a href="https://fourthe20.carrd.co" class="logo">Four<span>The</span>20</a>
    <nav>
      <a href="/muses/" class="back-btn">← All Muses</a>
      <a href="https://fourthe20.myshopify.com" target="_blank">Shop</a>
    </nav>
  </header>

  <div id="loading">
    <div class="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <p class="loader-text">Loading...</p>
  </div>

  <div id="content">

    <!-- STREAM + SIDEBAR -->
    <section class="stream-section">

      <div class="stream-container">
        <iframe
          id="stream-iframe"
          class="stream-iframe"
          src=""
          scrolling="no"
          allow="autoplay"
          allowfullscreen>
        </iframe>
        <div class="stream-offline" id="stream-offline">
          <div class="offline-name" id="offline-name"></div>
          <div class="offline-text">Currently offline</div>
          <div class="offline-text" style="opacity:0.4; font-size:0.55rem;">Check back later or follow on Fansly</div>
        </div>
      </div>

      <aside class="sidebar">
        <div class="model-header">
          <div id="model-photo-wrap"></div>
          <div class="live-badge" id="live-badge">
            <div class="live-dot" id="live-dot"></div>
            <span id="live-text">Offline</span>
          </div>
          <div class="model-name" id="model-name"></div>
          <div class="model-handle" id="model-handle"></div>
          <div class="model-bio" id="model-bio"></div>
        </div>

        <div class="tags-section" id="tags-section"></div>

        <div class="actions-section">
          <a id="btn-watch" href="#" target="_blank" class="btn btn-primary">Watch on Chaturbate</a>
          <a id="btn-tip" href="#" target="_blank" class="btn btn-tip">💚 Send a Tip</a>
          <a id="btn-fansly" href="#" target="_blank" class="btn btn-secondary" style="display:none;">Follow on Fansly</a>
        </div>

        <div class="platforms-section" id="platforms-section">
          <div class="section-label">Find Her On</div>
          <div class="platform-links" id="platform-links"></div>
        </div>

      </aside>
    </section>

    <!-- PHOTO GALLERY -->
    <section class="gallery-section">
      <div class="gallery-header">
        <h2 class="gallery-title">Gallery</h2>
        <span class="section-label" id="gallery-count"></span>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </section>

    <!-- MORE MUSES -->
    <section class="more-section">
      <div class="more-label">More Muses</div>
      <div class="more-grid" id="more-grid"></div>
    </section>

    <footer>
      <div class="footer-logo">Four The20</div>
      <div class="footer-links">
        <a href="/muses/">Directory</a>
        <a href="https://fourthe20.myshopify.com" target="_blank">Shop</a>
        <a href="https://x.com/four_the20" target="_blank">X</a>
        <a href="https://instagram.com/four_the20" target="_blank">Instagram</a>
        <a href="https://form.typeform.com/to/RK7h1dMH" target="_blank">Become a Muse</a>
      </div>
      <div class="footer-copy">© Four The20. All rights reserved.</div>
    </footer>

  </div>

  <script>
    const WORKER_URL = 'https://muse.four-the20.workers.dev/';
    const CB_AFFILIATE = 'https://chaturbate.com/in/?tour=LQps&campaign=Jz7oe&track=default&room=';

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const username = params.get('username');

      if (!username) {
        window.location.href = '/muses/';
        return;
      }

      try {
        // Fetch this model
        const res = await fetch(`${WORKER_URL}?username=${username}`);
        if (!res.ok) throw new Error('Not found');
        const record = await res.json();
        const f = record.fields;

        // Update page title
        document.title = `${f['Name'] || username} — Four The20`;

        // Photo
        const photoWrap = document.getElementById('model-photo-wrap');
        if (f['Photo'] && f['Photo'][0]) {
          photoWrap.innerHTML = `<img class="model-photo" src="${f['Photo'][0].url}" alt="${f['Name']}" />`;
        } else {
          photoWrap.innerHTML = `<div class="model-photo-placeholder">✦</div>`;
        }

        // Live status
        const isLive = f['Is_Live'] || false;
        const liveBadge = document.getElementById('live-badge');
        const liveDot = document.getElementById('live-dot');
        const liveText = document.getElementById('live-text');

        if (isLive) {
          liveBadge.classList.remove('offline');
          liveText.textContent = 'Live Now';
        } else {
          liveBadge.classList.add('offline');
          liveDot.classList.add('off');
          liveText.textContent = 'Offline';
        }

        // Name + handle + bio
        document.getElementById('model-name').textContent = f['Name'] || username;
        document.getElementById('model-handle').textContent = f['Handle'] || `@${username}`;
        document.getElementById('model-bio').textContent = f['Bio'] || '';

        // Tags
        const tagsSection = document.getElementById('tags-section');
        if (f['Tags']) {
          const tags = f['Tags'].split(',').map(t => t.trim());
          tagsSection.innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');
        } else {
          tagsSection.style.display = 'none';
        }

        // Stream
        const cbUsername = f['CB_Username'] || username;
        const streamIframe = document.getElementById('stream-iframe');
        const streamOffline = document.getElementById('stream-offline');

        if (isLive) {
          streamIframe.src = `https://chaturbate.com/embed/${cbUsername}/?join_overlay=1&campaign=Jz7oe&tour=LQps&bgcolor=black`;
        } else {
          streamIframe.style.display = 'none';
          streamOffline.classList.add('visible');
          document.getElementById('offline-name').textContent = f['Name'] || username;
        }

        // Action buttons
        const cbLink = `${CB_AFFILIATE}${cbUsername}`;
        const tipLink = `https://chaturbate.com/tip_without_login/?room=${cbUsername}&campaign=Jz7oe`;
        document.getElementById('btn-watch').href = cbLink;
        document.getElementById('btn-tip').href = tipLink;

        const fanslyBtn = document.getElementById('btn-fansly');
        if (f['Fansly_URL']) {
          fanslyBtn.href = f['Fansly_URL'];
          fanslyBtn.style.display = 'block';
        }

        // Platform links
        const platformLinks = document.getElementById('platform-links');
        const platforms = [];
        if (cbUsername) platforms.push({ name: 'Chaturbate', url: cbLink });
        if (f['Fansly_URL']) platforms.push({ name: 'Fansly', url: f['Fansly_URL'] });

        platformLinks.innerHTML = platforms.map(p => `
          <a href="${p.url}" target="_blank" class="platform-link">
            <span class="platform-name">${p.name}</span>
            <span class="platform-arrow">→</span>
          </a>
        `).join('');

        // Gallery
        const galleryGrid = document.getElementById('gallery-grid');
        const photos = f['Photo'] || [];
        const galleryPhotos = f['Gallery'] || photos; // use Gallery field if exists, fallback to Photo

        if (galleryPhotos.length > 0) {
          document.getElementById('gallery-count').textContent = `${galleryPhotos.length} photos`;
          galleryGrid.innerHTML = galleryPhotos.map(p => `
            <div class="gallery-item">
              <img src="${p.url}" alt="${f['Name']}" loading="lazy" />
            </div>
          `).join('');
        } else {
          galleryGrid.innerHTML = `<div class="gallery-empty">Gallery coming soon</div>`;
        }

        // More muses
        const moreRes = await fetch(WORKER_URL);
        const moreData = await moreRes.json();
        const others = (moreData.records || []).filter(r => r.fields['CB_Username'] !== cbUsername).slice(0, 6);
        const moreGrid = document.getElementById('more-grid');

        if (others.length > 0) {
          moreGrid.innerHTML = others.map(r => {
            const mf = r.fields;
            const mPhoto = mf['Photo'] && mf['Photo'][0] ? mf['Photo'][0].url : null;
            const mCB = mf['CB_Username'] || '';
            return `
              <a href="/muses/muse.html?username=${mCB}" class="more-card">
                ${mPhoto
                  ? `<img src="${mPhoto}" alt="${mf['Name']}" loading="lazy" />`
                  : `<div style="width:100%;height:100%;background:var(--card);"></div>`
                }
                <div class="more-card-info">
                  <div class="more-card-name">${mf['Name'] || mCB}</div>
                </div>
              </a>
            `;
          }).join('');
        }

        // Show content
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

      } catch (err) {
        document.getElementById('loading').innerHTML = `
          <p style="font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);">Muse not found</p>
          <a href="/muses/" style="font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);text-decoration:none;margin-top:1rem;">← Back to directory</a>
        `;
      }
    }

    init();
  </script>
</body>
</html>
