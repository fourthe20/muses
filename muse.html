<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Four The20 — Muse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    #content { display: none; padding-top: 65px; }

    /* HERO */
    .hero-section {
      display: grid;
      grid-template-columns: 480px 1fr;
      min-height: 85vh;
      border-bottom: 1px solid var(--border);
    }
    .hero-photo {
      position: relative;
      overflow: hidden;
      background: var(--deep);
    }
    .hero-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: grayscale(10%) contrast(1.05);
      display: block;
    }
    .hero-photo-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 8rem;
      color: var(--border);
      font-style: italic;
    }

    .live-pill {
      position: absolute;
      top: 1.5rem; left: 1.5rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: rgba(8,8,8,0.85);
      border: 1px solid var(--green-bright);
      padding: 0.35rem 0.8rem;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green-bright);
      backdrop-filter: blur(6px);
    }
    .live-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green-bright);
      animation: pulse 2s infinite;
    }
    .hero-identity {
      padding: 3rem 3.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-left: 1px solid var(--border);
    }
    .eyebrow {
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .model-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .model-handle { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 1.5rem; }
    .model-bio { font-size: 0.7rem; line-height: 1.8; color: rgba(255,255,255,0.45); max-width: 480px; margin-bottom: 2rem; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      border: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .stat-cell {
      padding: 1rem 1.2rem;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat-cell:nth-child(even) { border-right: none; }
    .stat-cell:nth-last-child(-n+2) { border-bottom: none; }
    .stat-label { font-size: 0.5rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
    .stat-value { font-size: 0.75rem; letter-spacing: 0.1em; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 2rem; }
    .actions-row { display: flex; gap: 0.8rem; flex-wrap: wrap; }

    /* GALLERY */
    .gallery-section { padding: 3rem 2.5rem; border-bottom: 1px solid var(--border); }
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .section-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-style: italic; }
    .section-meta { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5px;
    }
    .gallery-item { aspect-ratio: 3/4; overflow: hidden; background: var(--card); cursor: pointer; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; filter: grayscale(15%); }
    .gallery-item:hover img { transform: scale(1.05); filter: grayscale(0%); }
    .gallery-empty { grid-column: 1/-1; padding: 3rem; text-align: center; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
    .lightbox-close { position: absolute; top: 1.5rem; right: 2rem; font-size: 1.5rem; color: var(--muted); cursor: pointer; background: none; border: none; transition: color 0.2s; }
    .lightbox-close:hover { color: var(--white); }

    /* STREAM */
    .stream-section { border-bottom: 1px solid var(--border); }
    .stream-header {
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stream-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-style: italic; }
    .stream-body { width: 100%; height: 600px; background: #000; position: relative; }
    .stream-iframe { width: 100%; height: 100%; border: none; display: block; }
    .stream-offline {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--deep);
    }
    .stream-offline.visible { display: flex; }
    .offline-name { font-family: 'Playfair Display', serif; font-size: 3rem; font-style: italic; color: var(--gold); opacity: 0.2; }
    .offline-text { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }

    /* MORE MUSES */
    .more-section { padding: 2.5rem; background: var(--deep); border-bottom: 1px solid var(--border); }
    .more-grid { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.5rem; margin-top: 1.5rem; }
    .more-card { flex: 0 0 180px; aspect-ratio: 3/4; position: relative; overflow: hidden; border: 1px solid var(--border); text-decoration: none; transition: border-color 0.2s; }
    .more-card:hover { border-color: var(--gold-dim); }
    .more-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%); transition: all 0.3s; }
    .more-card:hover img { filter: grayscale(0%); }
    .more-card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 0.8rem; background: linear-gradient(to top, rgba(8,8,8,0.95), transparent); }
    .more-card-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; }

    @media (max-width: 900px) {
      .hero-section { grid-template-columns: 1fr; }
      .hero-photo { min-height: 60vw; max-height: 80vw; }
      .live-pill {
      position: absolute;
      top: 1.5rem; left: 1.5rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: rgba(8,8,8,0.85);
      border: 1px solid var(--green-bright);
      padding: 0.35rem 0.8rem;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green-bright);
      backdrop-filter: blur(6px);
    }
    .live-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green-bright);
      animation: pulse 2s infinite;
    }
    .hero-identity { padding: 2rem 1.5rem; }
      .gallery-section, .more-section, .stream-header { padding-left: 1.2rem; padding-right: 1.2rem; }
      .actions-row { flex-direction: column; }
      .btn { width: 100%; }
      .stream-body { height: 56vw; }
    }
  </style>
</head>
<body>

  <header>
    <a href="https://fourthe20.carrd.co" class="logo">Four<span>The</span>20</a>
    <nav>
      <a href="/muses/">← All Muses</a>
      <a href="https://fourthe20.myshopify.com" target="_blank">Shop</a>
      <a href="https://form.typeform.com/to/RK7h1dMH" target="_blank">Become a Muse</a>
    </nav>
  </header>

  <div id="loading">
    <div class="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <p class="loader-text">Loading...</p>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <div id="content">

    <section class="hero-section">
      <div class="hero-photo">
        <div id="hero-photo-wrap" style="width:100%;height:100%;"></div>

      </div>
      <div class="hero-identity">
        <div>
          <div class="eyebrow">Four The20 Muse</div>
          <div class="model-name" id="model-name"></div>
          <div class="model-handle" id="model-handle"></div>
          <div class="model-bio" id="model-bio"></div>
          <div class="stats-grid" id="stats-grid"></div>
          <div class="tags-row" id="tags-row"></div>
        </div>
        <div class="actions-row" id="actions-row"></div>
      </div>
    </section>

    <section class="gallery-section">
      <div class="section-header">
        <h2 class="section-title">Gallery</h2>
        <span class="section-meta" id="gallery-count"></span>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </section>

    <section class="stream-section">
      <div class="stream-header">
        <div class="stream-title" id="stream-title">Watch Live</div>
      </div>
      <div class="stream-body">
        <iframe id="stream-iframe" class="stream-iframe" src="" scrolling="no" allow="autoplay" allowfullscreen></iframe>
        <div class="stream-offline" id="stream-offline">
          <div class="offline-name" id="offline-name"></div>
          <div class="offline-text">Currently offline</div>
          <div class="offline-text" style="opacity:0.4;font-size:0.55rem;margin-top:0.5rem;">Follow on Fansly to know when she's back</div>
        </div>
      </div>
    </section>

    <section class="more-section">
      <div class="section-meta">More Muses</div>
      <div class="more-grid" id="more-grid"></div>
    </section>

    <footer>
      <div class="footer-logo">Four The20</div>
      <div class="footer-links">
        <a href="/muses/">Directory</a>
        <a href="https://fourthe20.myshopify.com" target="_blank">Shop</a>
        <a href="https://x.com/four_the20" target="_blank">X</a>
        <a href="https://instagram.com/four_the20" target="_blank">Instagram</a>
        <a href="https://form.typeform.com/to/RK7h1dMH" target="_blank">Become a Muse</a>
      </div>
      <div class="footer-copy">© Four The20. All rights reserved.</div>
    </footer>

  </div>

  <script>
    const WORKER_URL   = 'https://muse.four-the20.workers.dev/';
    const CB_AFFILIATE = 'https://chaturbate.com/in/?tour=LQps&campaign=Jz7oe&track=default&room=';
    const TIP_URL      = 'https://chaturbate.com/tip_without_login/?campaign=Jz7oe&room=';
    const CB_EMBED     = 'https://chaturbate.com/embed/';

    function toSlug(str) {
      return (str || '').toLowerCase().replace(/\s+/g, '-');
    }

    async function init() {
      const params   = new URLSearchParams(window.location.search);
      const nameSlug = params.get('name');
      if (!nameSlug) { window.location.href = '/muses/'; return; }

      try {
        const res = await fetch(`${WORKER_URL}?name=${encodeURIComponent(nameSlug)}`);
        if (!res.ok) throw new Error('Not found');
        const record = await res.json();
        const f = record.fields;

        const displayName = f['DisplayName'] || f['Name'] || nameSlug;
        const cbUsername  = f['CB_Username'] || '';

        document.title = `${displayName} — Four The20`;

        // Hero photo
        const profilePic = f['Profile Pic']?.[0]?.url || f['Photo']?.[0]?.url || null;
        document.getElementById('hero-photo-wrap').innerHTML = profilePic
          ? `<img src="${profilePic}" alt="${displayName}" style="width:100%;height:100%;object-fit:cover;filter:grayscale(10%) contrast(1.05);" />`
          : `<div class="hero-photo-placeholder">✦</div>`;

        // Identity
        document.getElementById('model-name').textContent   = displayName;
        document.getElementById('model-handle').textContent = cbUsername ? `@${cbUsername}` : '';
        document.getElementById('model-bio').textContent    = f['Bio'] || '';

        // Stats
        const stats = [
          { label: 'Ethnicity',        value: f['Ethnicity'] },
          { label: 'Body Type',        value: f['Body Type'] },
          { label: 'Bust Size',        value: f['Bust Size'] },
          { label: 'Hair',             value: f['Hair'] },
          { label: 'Aesthetic',        value: f['Aesthetic'] },
          { label: 'Body Decorations', value: f['Body Decorations'] },
          { label: 'Birthday',         value: f['Birthday'] },
          { label: 'Location',         value: f['Location'] },
        ].filter(s => s.value);
        const statsGrid = document.getElementById('stats-grid');
        if (stats.length) {
          statsGrid.innerHTML = stats.map(s => `
            <div class="stat-cell">
              <div class="stat-label">${s.label}</div>
              <div class="stat-value">${s.value}</div>
            </div>`).join('');
        } else {
          statsGrid.style.display = 'none';
        }

        // Tags
        if (f['Tags']) {
          document.getElementById('tags-row').innerHTML = f['Tags']
            .split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('');
        }

        // Buttons
        let btns = '';
        if (cbUsername) btns += `<a href="${CB_AFFILIATE}${cbUsername}" target="_blank" class="btn btn-primary">Watch on Chaturbate</a>`;
        if (cbUsername) btns += `<a href="${TIP_URL}${cbUsername}" target="_blank" class="btn btn-tip">💚 Send a Tip</a>`;
        if (f['Fansly_URL']) btns += `<a href="${f['Fansly_URL']}" target="_blank" class="btn btn-secondary">Follow on Fansly</a>`;
        document.getElementById('actions-row').innerHTML = btns;

        // Gallery — images only
        const galleryPhotos = (f['Gallery'] || f['Photo'] || []).filter(p => p.type?.startsWith('image/'));
        document.getElementById('gallery-count').textContent = galleryPhotos.length ? `${galleryPhotos.length} photos` : '';
        const galleryGrid = document.getElementById('gallery-grid');
        if (galleryPhotos.length) {
          galleryGrid.innerHTML = galleryPhotos.map(p => `
            <div class="gallery-item" data-src="${p.url}">
              <img src="${p.url}" alt="${displayName}" loading="lazy" />
            </div>`).join('');
          galleryGrid.addEventListener('click', e => {
            const item = e.target.closest('.gallery-item');
            if (!item) return;
            document.getElementById('lightbox-img').src = item.dataset.src;
            document.getElementById('lightbox').classList.add('open');
          });
        } else {
          galleryGrid.innerHTML = `<div class="gallery-empty">Gallery coming soon</div>`;
        }
        document.getElementById('lightbox-close').addEventListener('click', () =>
          document.getElementById('lightbox').classList.remove('open'));
        document.getElementById('lightbox').addEventListener('click', e => {
          if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
        });

        // Stream — always show embed, CB handles offline state natively
        document.getElementById('stream-title').textContent = `Watch ${displayName}`;
        document.getElementById('offline-name').textContent = displayName;
        if (cbUsername) {
          const streamIframe = document.getElementById('stream-iframe');
          streamIframe.src = `${CB_EMBED}${cbUsername}/?join_overlay=1&campaign=Jz7oe&tour=LQps&bgcolor=black`;

          // Detect live state from iframe load behavior:
          // live stream = cross-origin block (throws) = model is live
          // offline page = no cross-origin = model is offline
          streamIframe.addEventListener('load', () => {
            const pill = document.getElementById('live-pill');
            if (!pill) return;
            try {
              const doc = streamIframe.contentDocument;
              // undefined = cross-origin = live stream
              // null or accessible = offline CB page
              if (doc === undefined) {
                pill.style.display = 'flex';
              } else {
                pill.style.display = 'none';
              }
            } catch(e) {
              // exception also means cross-origin = live
              pill.style.display = 'flex';
            }
          });
        } else {
          document.getElementById('stream-iframe').style.display = 'none';
          document.getElementById('stream-offline').classList.add('visible');
        }

        // More muses
        const moreData = await fetch(WORKER_URL).then(r => r.json());
        const others = (moreData.records || [])
          .filter(r => toSlug(r.fields['DisplayName'] || r.fields['Name']) !== nameSlug)
          .slice(0, 8);
        document.getElementById('more-grid').innerHTML = others.map(r => {
          const mName  = r.fields['DisplayName'] || r.fields['Name'] || '';
          const mPhoto = r.fields['Profile Pic']?.[0]?.url || r.fields['Photo']?.[0]?.url || null;
          return `
            <a href="/muses/muse.html?name=${toSlug(mName)}" class="more-card">
              ${mPhoto ? `<img src="${mPhoto}" alt="${mName}" loading="lazy" />` : `<div style="width:100%;height:100%;background:var(--card);"></div>`}
              <div class="more-card-info"><div class="more-card-name">${mName}</div></div>
            </a>`;
        }).join('');

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

      } catch (err) {
        document.getElementById('loading').innerHTML = `
          <p style="font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);">Muse not found</p>
          <a href="/muses/" style="font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);text-decoration:none;margin-top:1rem;">← Back to directory</a>`;
      }
    }

    init();
  </script>
</body>
</html>
